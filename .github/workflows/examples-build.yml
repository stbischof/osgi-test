name: Examples Build

on:
  push:
    branches-ignore:
    - 'dependabot/**'
    paths:
    - 'examples/**'
    - '.github/**/*example*'
  pull_request:
    paths:
    - 'examples/**'
    - '.github/**/*example*'

env:
  LC_ALL: en_US.UTF-8
  GRADLE_OPTS: >-
    -Dorg.gradle.parallel=true
  MAVEN_OPTS: >-
    -Dhttp.keepAlive=false
    -Dmaven.wagon.http.pool=false
    -Dmaven.wagon.http.retryHandler.count=3

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  examples:
    strategy:
      matrix:
        java:
        - '17'
        - '21'
        - '25'
        os:
        - 'ubuntu-latest'
        example:
        - 'mvn'
        - 'gradle'
        - 'bndworkspace'
    name: example-${{ matrix.example }} JDK${{ matrix.java }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc
      with:
        egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

    - name: Git Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Gradle Wrapper Validation
      uses: gradle/wrapper-validation-action@f9c9c575b8b21b6485636a91ffecd10e558c62f6
    - name: Set up Java ${{ matrix.java }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
    - name: Build Maven Example
      if: matrix.example == 'mvn'
      run: |
        ./mvnw -B --no-transfer-progress --file examples/osgi-test-example-mvn verify
    - name: Build Gradle Example
      if: matrix.example == 'gradle'
      run: |
        cd examples/osgi-test-example-gradle
        ./gradlew build
    - name: Build BndWorkspace Example
      if: matrix.example == 'bndworkspace'
      run: |
        cd examples/osgi-test-example-bndworkspace
        ./gradlew build
